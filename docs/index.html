<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>加瀬様 不動産CRM</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<aside>
  <div class="sidebar-top">
    <h1>加瀬様 不動産CRM<small>有限会社スローライフ</small></h1>
    <nav>
      <button data-tab="dashboard" class="active">ダッシュボード</button>
      <button data-tab="properties">物件一覧</button>
      <button data-tab="contacts">顧客一覧</button>
      <button data-tab="transactions">取引一覧</button>
    </nav>
  </div>
  <div class="sidebar-bottom">
    <button data-tab="settings" id="nav-settings">⚙ 設定</button>
  </div>
</aside>

<main>
  <div class="topbar">
    <h2 id="page-title">ダッシュボード</h2>
    <div class="topbar-actions">
      <div id="dirty-banner" class="dirty-banner hidden">変更があります。「更新」を押すまで保存されません。</div>
      <button id="btn-new" class="btn-secondary">＋ 新規登録</button>
      <button id="btn-update" class="btn-primary" disabled>更新</button>
    </div>
  </div>

  <section id="dashboard" class="active">
    <h3>進行中の物件</h3>
    <div id="dashboard-cards" class="card-row"></div>
    <h3>直近イベント</h3>
    <div id="recent-events" class="loading">読み込み中...</div>
  </section>

  <section id="properties">
    <div class="filters">
      <input type="text" id="filter-property-keyword" placeholder="物件名・所在地・売主名で検索" />
      <select id="filter-property-status"><option value="">ステータス: すべて</option></select>
      <select id="filter-property-pref"><option value="">都道府県: すべて</option></select>
    </div>
    <div id="properties-table" class="loading">読み込み中...</div>
  </section>

  <section id="contacts">
    <div class="filters">
      <input type="text" id="filter-contact-keyword" placeholder="氏名・メール・電話番号で検索" />
      <select id="filter-contact-type"><option value="">種別: すべて</option></select>
    </div>
    <div id="contacts-table" class="loading">読み込み中...</div>
  </section>

  <section id="transactions">
    <div class="filters">
      <input type="text" id="filter-tx-keyword" placeholder="物件名・買主氏名で検索" />
      <select id="filter-tx-status"><option value="">ステータス: すべて</option></select>
    </div>
    <div id="transactions-table" class="loading">読み込み中...</div>
  </section>

  <section id="settings">
    <h3>接続設定</h3>
    <div class="settings-card">
      <div class="settings-row"><span>API接続先</span><code id="settings-api-base"></code></div>
      <div class="settings-row"><span>データベース（スプレッドシート）</span><span id="settings-ss-status" class="loading">確認中...</span></div>
      <div class="settings-row">
        <span>一覧データの読み込みキャッシュ</span>
        <button id="btn-clear-cache" class="btn-secondary">キャッシュをクリア</button>
      </div>
      <p class="settings-note">
        ⚠ 現在のAPIトークンはこのフロントエンドのソースコードに平文で含まれており、公開リポジトリから誰でも読める状態です。
        実際の顧客個人情報を本格的に扱う前に、Googleアカウントによる認可方式への切り替えを推奨します。
      </p>
    </div>
  </section>

</main>

<button id="fab-add" class="fab" title="新規登録">＋</button>

<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">新規登録</h3>
      <button id="modal-close" class="modal-close">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script src="config.js"></script>
<script src="api.js"></script>
<script src="app.js"></script>
</body>
</html>
